name: PR Test

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test PR Changes
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
    
    - name: Install frontend dependencies
      run: npm ci
    
    - name: Run backend tests
      run: |
        cd backend
        pytest -v --timeout=120
      env:
        JWT_SECRET_KEY: testing-secret-key-1234567890-abcdef
        ALLOW_DEV: true
        STUB_MODE: true
        MAX_MODEL_INPUT_CHARS: 15000
        DATABASE_URL: sqlite:///./test_legalease.db
        ENVIRONMENT: testing
    
    - name: Run frontend tests
      run: npm test -- --run
