name: Quality Labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  checks: read
  contents: read
  issues: write
  pull-requests: read
  statuses: read

jobs:
  apply-quality-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Add quality labels from checks
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.QUALITY_LABEL_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const CLEAN_LABEL = 'quality:clean';
            const EXCEPTIONAL_LABEL = 'quality:exceptional';
            const QUALITY_CHECK_TARGET = 13;
            const CLEAN_PASS_THRESHOLD = 11;
            const REQUIRED_SECURITY_CHECKS = [
              'Dependency Audit',
              'CodeQL Security Analysis',
              'GitGuardian Security Checks',
            ];
            const ignoredCheckNames = new Set([
              "GSSoC'26 Auto Label PR / label-pr",
              "GSSoC'26 Welcome Bot / welcome",
            ]);

            async function getPullRequests() {
              if (context.eventName === 'pull_request_target') {
                return [context.payload.pull_request].filter((pull) => pull.state === 'open');
              }

              return github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                base: 'main',
                per_page: 100,
              });
            }

            function normalizeCheckName(check) {
              return `${check.app?.name || 'GitHub Actions'} / ${check.name}`;
            }

            function isTrackedQualityCheck(check) {
              if (!['completed', 'success'].includes(check.status)) return false;
              const fullName = normalizeCheckName(check);
              if (ignoredCheckNames.has(fullName) || ignoredCheckNames.has(check.name)) return false;
              if (check.name.toLowerCase().includes('welcome')) return false;
              if (check.name.toLowerCase().includes('label-pr')) return false;
              return ['success', 'failure', 'cancelled', 'timed_out', 'action_required', 'neutral', 'skipped'].includes(check.conclusion);
            }

            async function applyLabels(issueNumber, currentLabels, labelsToAdd, labelsToRemove) {
              const currentLabelNames = new Set(currentLabels.map((label) => label.name));

              for (const label of labelsToRemove) {
                if (!currentLabelNames.has(label)) {
                  continue;
                }

                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name: label,
                  });
                  console.log(`Removed ${label} from #${issueNumber}`);
                } catch (error) {
                  if (error.status === 404 || error.status === 403) {
                    core.warning(`Could not remove ${label} from #${issueNumber}: ${error.message}`);
                    continue;
                  }
                  throw error;
                }
              }

              const missingLabels = labelsToAdd.filter((label) => !currentLabelNames.has(label));
              if (missingLabels.length) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: missingLabels,
                  });
                  console.log(`Added ${missingLabels.join(', ')} to #${issueNumber}`);
                } catch (error) {
                  if (error.status === 403) {
                    core.warning(
                      `Could not add ${missingLabels.join(', ')} to #${issueNumber}: ${error.message}. ` +
                      'If this repeats, add a QUALITY_LABEL_TOKEN secret with issues write access.'
                    );
                    return;
                  }
                  throw error;
                }
              }
            }

            const pulls = await getPullRequests();
            if (!pulls.length) {
              console.log('No open pull request found for this event.');
              return;
            }

            for (const pull of pulls) {
              const sha = pull.head.sha;
              const issueNumber = pull.number;
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });

              const checks = data.check_runs.filter(isTrackedQualityCheck);
              const securityChecks = checks.filter((check) => REQUIRED_SECURITY_CHECKS.includes(check.name));
              const passedChecks = checks.filter((check) => check.conclusion === 'success');
              const passedSecurityChecks = securityChecks.filter((check) => check.conclusion === 'success');
              const allSecurityPassed =
                REQUIRED_SECURITY_CHECKS.every((name) =>
                  securityChecks.some((check) => check.name === name && check.conclusion === 'success')
                );
              const cleanThresholdMet =
                checks.length >= QUALITY_CHECK_TARGET &&
                passedChecks.length >= CLEAN_PASS_THRESHOLD;

              console.log(`#${issueNumber}: ${passedChecks.length}/${checks.length} tracked checks passed.`);
              console.log(`#${issueNumber}: ${passedSecurityChecks.length}/${securityChecks.length} security checks passed.`);

              if (allSecurityPassed) {
                await applyLabels(issueNumber, pull.labels || [], [EXCEPTIONAL_LABEL], [CLEAN_LABEL]);
              } else if (cleanThresholdMet) {
                await applyLabels(issueNumber, pull.labels || [], [CLEAN_LABEL], [EXCEPTIONAL_LABEL]);
              } else {
                await applyLabels(issueNumber, pull.labels || [], [], [CLEAN_LABEL, EXCEPTIONAL_LABEL]);
              }
            }
